<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Phantom</title>
  </head>
  <body>
    <div id="app">
      <!-- Main screen -->
      <div id="screen-main" class="screen">
        <div class="header">
          <img src="./src/assets/images/phantom-emblem.png" class="emblem" alt="" />
          <div class="title">Phantom</div>
          <div class="spacer"></div>
          <button id="btn-gear" class="icon-btn" title="Настройки">&#9881;</button>
        </div>

        <div class="center">
          <button id="btn-power" class="power-btn idle">
            <svg viewBox="0 0 24 24" class="power-icon">
              <path d="M12 2v9" stroke-linecap="round" />
              <path d="M6.5 5.5a8 8 0 1 0 11 0" stroke-linecap="round" fill="none" />
            </svg>
            <svg class="spinner" viewBox="0 0 50 50">
              <circle cx="25" cy="25" r="20" fill="none" stroke-width="4" />
            </svg>
          </button>

          <div id="status-text" class="status-text">Отключено</div>
          <div id="hint-text" class="hint-text">Нажмите &#9881; и вставьте client.yaml</div>
        </div>
      </div>

      <!-- Config screen -->
      <div id="screen-config" class="screen hidden">
        <div class="header">
          <button id="btn-back-config" class="icon-btn">&#8592;</button>
          <div class="title">Конфигурация</div>
        </div>
        <div class="content">
          <div class="label">Вставьте содержимое client.yaml целиком:</div>
          <textarea id="config-textarea" placeholder='server: "1.2.3.4:8443"&#10;domain: "your-domain.example"&#10;...'></textarea>
          <div class="row">
            <button id="btn-save" class="btn btn-primary">Сохранить</button>
          </div>
          <button id="btn-view-log" class="btn btn-outline">Посмотреть лог</button>
        </div>
      </div>

      <!-- Log screen -->
      <div id="screen-log" class="screen hidden">
        <div class="header">
          <button id="btn-back-log" class="icon-btn">&#8592;</button>
          <div class="title">Лог</div>
        </div>
        <div class="content">
          <pre id="log-text" class="log-text"></pre>
          <button id="btn-copy-log" class="btn btn-primary">Скопировать</button>
        </div>
      </div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
